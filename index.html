<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#0A1628"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Patagônia"/>
  <title>Patagônia 2024</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0A1628; color: #E8E0D0; font-family: Georgia, serif; overscroll-behavior: none; }
    #app { height: 100%; display: flex; flex-direction: column; }
    a { color: inherit; }

    .topbar { background: #0d1a2e; border-bottom: 1px solid #1e2e4a; padding: 12px 14px 0; padding-top: max(12px, env(safe-area-inset-top)); flex-shrink: 0; position: sticky; top: 0; z-index: 50; }
    .topbar-inner { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .eyebrow { font-size: 9px; letter-spacing: 3px; color: #4ECDC4; text-transform: uppercase; margin-bottom: 2px; }
    .app-title { font-size: 19px; font-weight: normal; color: #E8E0D0; }
    .subtitle { color: #7B9EC4; font-size: 13px; }
    .topbar-right { text-align: right; }
    .progress-label { font-size: 10px; color: #7B9EC4; margin-bottom: 4px; }
    .progress-bar { background: #1a2a4a; border-radius: 99px; height: 5px; width: 110px; margin-left: auto; }
    .progress-fill { background: #4ECDC4; height: 5px; border-radius: 99px; transition: width .4s; }
    .mt-8 { margin-top: 8px; }

    .nav-tabs { display: flex; gap: 4px; padding-bottom: 1px; overflow-x: auto; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab { padding: 6px 12px; border-radius: 8px 8px 0 0; border: none; cursor: pointer; font-size: 12px; font-family: Georgia, serif; white-space: nowrap; background: #1a2a4a; color: #7B9EC4; border-bottom: 2px solid transparent; transition: all .2s; }
    .nav-tab.active { background: #0A1628; color: #4ECDC4; border-bottom-color: #4ECDC4; }
    .nav-tab:hover:not(.active) { color: #E8E0D0; }
    .ml-auto { margin-left: auto; }

    /* LAYOUT */
    .content { flex: 1; overflow: hidden; display: flex; position: relative; }
    .content.full-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; display: block; padding: 12px 12px 80px; }

    /* SIDEBAR */
    .sidebar { width: 320px; flex-shrink: 0; background: #0d1a2e; border-right: 1px solid #1e2e4a; display: flex; flex-direction: column; overflow: hidden; z-index: 5; }
    .sidebar-header { padding: 12px 14px 10px; border-bottom: 1px solid #1e2e4a; flex-shrink: 0; }
    .sidebar-header-title { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: #4ECDC4; margin-bottom: 2px; }
    .sidebar-subtitle { font-size: 11px; color: #7B9EC4; margin-bottom: 8px; }
    .sidebar-search { width: 100%; background: #111e35; border: 1px solid #1e2e4a; border-radius: 8px; padding: 7px 11px; color: #E8E0D0; font-size: 12px; font-family: Georgia, serif; outline: none; }
    .sidebar-search:focus { border-color: #4ECDC4; }
    .sidebar-search::placeholder { color: #4a6a8a; }
    .sidebar-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 40px; }
    .sidebar-list::-webkit-scrollbar { width: 3px; }
    .sidebar-list::-webkit-scrollbar-thumb { background: #1e2e4a; border-radius: 3px; }

    /* MAP PANEL */
    .map-panel { flex: 1; position: relative; overflow: hidden; }
    #map { position: absolute; inset: 0; }
    .map-hint-float { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); background: rgba(13,26,46,.92); border: 1px solid #1e2e4a; border-radius: 8px; padding: 8px 14px; font-size: 11px; color: #7B9EC4; pointer-events: none; white-space: nowrap; z-index: 10; }

    /* DRAWER */
    .detail-drawer { position: absolute; bottom: 0; left: 0; right: 0; background: #0d1a2e; border-top: 1px solid #1e2e4a; border-radius: 16px 16px 0 0; padding: 14px 16px 28px; max-height: 54%; overflow-y: auto; -webkit-overflow-scrolling: touch; z-index: 20; animation: slideUp .2s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .drawer-handle { width: 36px; height: 4px; background: #2a3a5a; border-radius: 2px; margin: 0 auto 14px; }
    .drawer-close { position: absolute; top: 14px; right: 14px; background: #1a2a4a; border: none; color: #7B9EC4; border-radius: 50%; width: 26px; height: 26px; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .drawer-edit-btn { position: absolute; top: 14px; right: 48px; background: #1a2a4a; border: none; color: #4ECDC4; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 11px; font-family: Georgia, serif; }

    /* REGION */
    .region-group { margin-bottom: 6px; }
    .region-divider { display: flex; align-items: center; gap: 8px; padding: 12px 14px 6px; }
    .region-line { flex: 1; height: 1px; opacity: .4; }
    .region-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }

    /* DAY CARD */
    .day-card { background: #111e35; border-radius: 10px; margin-bottom: 6px; border: 1px solid #1e2e4a; transition: all .2s; overflow: hidden; cursor: pointer; }
    .day-card.done { background: #0a160a; border-color: #1d3a1d; opacity: .7; }
    .day-card.selected { border-color: #4ECDC4; }
    .day-card.sidebar-row { border-radius: 0; margin-bottom: 0; border: none; border-left: 3px solid transparent; border-bottom: 1px solid #1a2540; background: transparent; }
    .day-card.sidebar-row:hover { background: #111e35; }
    .day-card.sidebar-row.selected { background: #111e35; border-left-color: #4ECDC4; }

    .day-header { display: flex; align-items: center; gap: 10px; padding: 10px 12px; }
    .day-check { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid #2a3a5a; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; color: transparent; transition: all .2s; }
    .day-check.checked { background: #4ECDC4; border-color: #4ECDC4; color: #0A1628; }
    .day-bar { width: 3px; height: 30px; border-radius: 2px; flex-shrink: 0; }
    .day-emoji { font-size: 14px; flex-shrink: 0; }
    .day-info { flex: 1; min-width: 0; }
    .day-meta { display: flex; justify-content: space-between; }
    .day-date { font-size: 10px; color: #7B9EC4; }
    .day-drive { font-size: 10px; color: #4ECDC4; }
    .day-title { font-size: 12px; color: #E8E0D0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .day-stays { font-size: 10px; color: #4a6a8a; margin-top: 1px; }
    .day-edit-btn { background: none; border: none; color: #4a6a8a; cursor: pointer; font-size: 13px; padding: 4px; flex-shrink: 0; opacity: 0; transition: opacity .15s; }
    .day-card:hover .day-edit-btn { opacity: 1; }
    .day-card.sidebar-row:hover .day-edit-btn { opacity: 1; }

    /* DETAIL PANEL */
    .detail-panel { background: #0d1828; border-radius: 0 0 10px 10px; padding: 14px; }
    .detail-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .detail-region { font-size: 9px; color: #7B9EC4; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 3px; }
    .detail-title { font-size: 15px; color: #E8E0D0; margin-bottom: 4px; }
    .detail-meta { font-size: 11px; color: #4a6a8a; }
    .btn-edit-sm { background: #1a2a4a; border: none; color: #4ECDC4; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; flex-shrink: 0; font-family: Georgia, serif; }
    .highlights { margin-bottom: 4px; }
    .highlight-item { display: flex; gap: 8px; font-size: 13px; color: #C8D8E8; margin-bottom: 5px; line-height: 1.5; }
    .hl-arrow { flex-shrink: 0; }

    .box-tip   { background: #1a1500; border-left: 3px solid #FFD166; border-radius: 0 8px 8px 0; padding: 10px 12px; margin-top: 10px; font-size: 12px; color: #FFD166; line-height: 1.6; }
    .box-paleo { background: #0d1a0d; border-left: 3px solid #52c852; border-radius: 0 8px 8px 0; padding: 10px 12px; margin-top: 8px; font-size: 12px; color: #A5D6A7; line-height: 1.7; }
    .box-alert { background: #1a0a0a; border-left: 3px solid #C0392B; border-radius: 0 8px 8px 0; padding: 10px 12px; margin-top: 8px; font-size: 12px; color: #F1948A; line-height: 1.6; }

    .media-section { margin-top: 14px; }
    .section-divider { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .section-divider div { flex: 1; height: 1px; background: #1e2e4a; }
    .section-divider span { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #4a6a8a; white-space: nowrap; }
    .media-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-bottom: 10px; }
    .media-thumb { aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #0A1628; cursor: pointer; position: relative; }
    .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .play-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(0,0,0,.3); }
    .upload-btn { display: flex; align-items: center; justify-content: center; gap: 6px; background: #1a2a4a; border: 1px dashed #2a3a5a; border-radius: 8px; padding: 10px; cursor: pointer; font-size: 13px; color: #7B9EC4; width: 100%; font-family: Georgia, serif; transition: all .2s; }
    .upload-btn:hover { border-color: #4ECDC4; color: #4ECDC4; }
    .diary-textarea { width: 100%; min-height: 80px; background: #0A1628; border: 1px solid #2a3a5a; border-radius: 8px; padding: 10px; color: #E8E0D0; font-size: 13px; font-family: Georgia, serif; resize: vertical; line-height: 1.6; }
    .diary-textarea:focus { outline: none; border-color: #4ECDC4; }
    .drive-cta { text-align: center; padding: 16px; color: #7B9EC4; font-size: 13px; }
    .drive-cta p { margin-bottom: 10px; }

    .reserva-group { margin-bottom: 20px; }
    .reserva-group-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: #7B9EC4; margin-bottom: 8px; }
    .reserva-item { display: flex; align-items: center; gap: 12px; background: #111e35; border: 1px solid #1e2e4a; border-radius: 10px; padding: 12px 14px; margin-bottom: 6px; cursor: pointer; transition: all .2s; }
    .reserva-item.done { background: #0a160a; border-color: #1d3a1d; opacity: .7; }
    .reserva-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #2a3a5a; background: transparent; display: flex; align-items: center; justify-content: center; color: transparent; font-size: 12px; flex-shrink: 0; transition: all .2s; }
    .reserva-check.checked { background: #4ECDC4; border-color: #4ECDC4; color: #0A1628; }
    .reserva-text { font-size: 13px; color: #E8E0D0; line-height: 1.4; }
    .reserva-item.done .reserva-text { text-decoration: line-through; color: #7B9EC4; }

    .paleo-card { background: #111e35; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
    .paleo-header { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
    .paleo-emoji { font-size: 22px; }
    .paleo-meta { font-size: 11px; color: #7B9EC4; }
    .paleo-title { font-size: 14px; color: #E8E0D0; }
    .book-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #1e2e4a; }
    .book-title { font-size: 14px; color: #E8E0D0; font-style: italic; }
    .book-author { font-size: 12px; color: #7B9EC4; }
    .book-note { font-size: 12px; color: #4a6a8a; margin-top: 2px; }

    .steps { margin-top: 10px; }
    .step { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 13px; color: #C8D8E8; line-height: 1.5; }
    .step-n { background: #4ECDC4; color: #0A1628; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; flex-shrink: 0; }
    .share-link { background: #0A1628; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #4ECDC4; word-break: break-all; margin-top: 6px; border: 1px solid #1e2e4a; }

    .card { background: #111e35; border-radius: 12px; padding: 16px; }
    .mb-16 { margin-bottom: 16px; }
    .card-title { font-size: 15px; color: #4ECDC4; margin-bottom: 4px; }
    .card-title.small { font-size: 13px; margin-bottom: 10px; }
    .card-sub { font-size: 13px; color: #7B9EC4; line-height: 1.6; }

    .btn-drive   { background: #4ECDC4; color: #0A1628; border: none; border-radius: 8px; padding: 7px 13px; font-size: 12px; cursor: pointer; font-weight: bold; font-family: Georgia, serif; }
    .btn-save    { background: #4ECDC4; color: #0A1628; border: none; border-radius: 8px; padding: 8px 18px; font-size: 13px; cursor: pointer; font-weight: bold; font-family: Georgia, serif; margin-top: 8px; }
    .btn-primary { flex: 1; padding: 10px; background: #4ECDC4; color: #0A1628; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
    .btn-danger  { padding: 10px 14px; background: #2a0a0a; color: #C0392B; border: 1px solid #C0392B; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }
    .btn-cancel  { padding: 10px 14px; background: #1a2a4a; color: #7B9EC4; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: Georgia, serif; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 400; overflow-y: auto; padding: 20px 12px; }
    .modal-box { max-width: 540px; margin: 0 auto; background: #111e35; border-radius: 16px; padding: 22px; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .modal-title { font-size: 17px; color: #4ECDC4; }
    .modal-close { background: none; border: none; color: #7B9EC4; font-size: 22px; cursor: pointer; }
    .modal-coords { font-size: 11px; color: #4a6a8a; margin-bottom: 14px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
    .field-label { font-size: 10px; color: #7B9EC4; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 4px; }
    .field-input { width: 100%; background: #0A1628; border: 1px solid #2a3a5a; border-radius: 6px; padding: 8px 10px; color: #E8E0D0; font-size: 13px; font-family: Georgia, serif; margin-bottom: 12px; }
    .field-input:focus { outline: none; border-color: #4ECDC4; }
    .field-textarea { width: 100%; background: #0A1628; border: 1px solid #2a3a5a; border-radius: 6px; padding: 8px 10px; color: #E8E0D0; font-size: 13px; font-family: Georgia, serif; resize: vertical; margin-bottom: 12px; }
    .field-textarea:focus { outline: none; border-color: #4ECDC4; }
    .hl-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .hl-input { flex: 1; background: #0A1628; border: 1px solid #2a3a5a; border-radius: 6px; padding: 7px 10px; color: #E8E0D0; font-size: 13px; font-family: Georgia, serif; }
    .hl-remove { background: none; border: none; color: #C0392B; font-size: 18px; cursor: pointer; }
    .add-hl-btn { font-size: 11px; color: #4ECDC4; background: none; border: none; cursor: pointer; padding: 2px 0 10px; }

    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.95); z-index: 500; display: flex; align-items: center; justify-content: center; }
    .lightbox-close { position: absolute; top: 16px; right: 16px; font-size: 28px; color: #fff; cursor: pointer; background: none; border: none; }

    .day-list { display: flex; flex-direction: column; }
    .leaflet-control-attribution { font-size: 9px !important; opacity: .4; }

    @media (max-width: 768px) {
      .content { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #1e2e4a; max-height: 40vh; }
      .map-panel { flex: 1; min-height: 0; }
      .detail-drawer { max-height: 65%; }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/drive.js"></script>
<script src="js/map.js"></script>
<script src="js/ui.js"></script>
<script src="js/actions.js"></script>
<script>
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(console.error);
  render();
</script>
</body>
</html>
